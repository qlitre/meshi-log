<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>飯屋検索</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            padding: 20px;
            max-width: 640px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e74c3c;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .filters input[type="text"] {
            flex: 1 1 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .filters input[type="text"]:focus {
            border-color: #e74c3c;
        }
        .filters select {
            flex: 1 1 calc(50% - 4px);
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.85rem;
            background: #fff;
            cursor: pointer;
        }
        .filters label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #555;
            cursor: pointer;
            padding: 4px 0;
        }
        .filters label input[type="checkbox"] {
            accent-color: #e74c3c;
            width: 16px;
            height: 16px;
        }
        #search-btn {
            width: 100%;
            padding: 10px;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #search-btn:hover { background: #c0392b; }
        #search-btn:active { background: #a93226; }
        #count {
            font-size: 0.8rem;
            color: #888;
            margin: 12px 0 8px;
        }
        #results {
            font-size: 0.9rem;
            color: #888;
        }
        .shop-card {
            background: #fff;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border: 1px solid #eee;
            transition: box-shadow 0.2s;
        }
        .shop-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .shop-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .shop-badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            font-weight: 600;
        }
        .shop-meta {
            font-size: 0.78rem;
            color: #888;
            margin-top: 4px;
        }
        .shop-memo {
            font-size: 0.83rem;
            color: #555;
            margin-top: 6px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <h1>飯屋検索</h1>
    <div class="filters">
        <input type="text" id="search-input" placeholder="キーワードで検索..." />
        <select id="area-select">
            <option value="">エリア（すべて）</option>
        </select>
        <select id="genre-select">
            <option value="">ジャンル（すべて）</option>
        </select>
        <label><input type="checkbox" id="recommended-check" /> おすすめのみ</label>
        <button id="search-btn">検索</button>
    </div>
    <p id="count"></p>
    <div id="results">検索してください</div>
    <script type="module" src="./main.ts"></script>
</body>

</html>
